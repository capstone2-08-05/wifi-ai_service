# AWS CodeBuild buildspec for SageMaker RF inference container.
#
# 사용법:
#   1. CodeBuild project 생성
#   2. Source: 이 git 저장소 (rf-service)
#   3. Buildspec 경로: buildspec.rf-sagemaker.yml
#   4. Privileged 모드 ON (docker build 필요)
#   5. CodeBuild service role 에 ECR push 권한 추가
#
# Override 가능한 환경변수:
#   - AWS_DEFAULT_REGION
#   - ECR_REPOSITORY_NAME
#   - IMAGE_TAG (예: latest, $CODEBUILD_RESOLVED_SOURCE_VERSION)

version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-northeast-2
    ECR_REPOSITORY_NAME: wificapstone-rf-inference
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - ECR_URI=$ECR_REGISTRY/$ECR_REPOSITORY_NAME
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - echo ECR_URI=$ECR_URI
      - echo IMAGE_TAG=$IMAGE_TAG
      # RF 컨테이너는 model weight 가 필요 없음 (Sionna 가 ITU radio material 만 사용).

  build:
    commands:
      - echo Building Docker image...
      - docker build -f apps/sagemaker_rf_inference/Dockerfile -t $ECR_REPOSITORY_NAME:$IMAGE_TAG .

  post_build:
    commands:
      - echo Tagging Docker image...
      - docker tag $ECR_REPOSITORY_NAME:$IMAGE_TAG $ECR_URI:$IMAGE_TAG
      - echo Pushing Docker image...
      - docker push $ECR_URI:$IMAGE_TAG
      - echo Pushed image to $ECR_URI:$IMAGE_TAG
      - printf '{"image_uri":"%s:%s"}\n' "$ECR_URI" "$IMAGE_TAG" > image_info.json

artifacts:
  files:
    - image_info.json
  name: rf-inference-image-info
