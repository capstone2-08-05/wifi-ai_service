seed: 42

data:
  train_image_dir: data/unet/images/train
  train_mask_dir: data/unet/masks/train
  val_image_dir: data/unet/images/val
  val_mask_dir: data/unet/masks/val
  image_size: 512
  resize_mode: letterbox
  train_patch_size:
  val_patch_size:
  wall_focus_prob: 0.8
  min_wall_ratio: 0.01
  patch_max_tries: 12

augment:
  flip_h_prob: 0.5
  flip_v_prob: 0.2

train:
  batch_size: 4
  epochs: 30
  lr: 0.0001
  num_workers: 4
  save_dir: checkpoints/unet_focal_dice
  amp: true

model:
  in_channels: 3
  out_channels: 1

loss:
  name: focal_dice
  focal_weight: 0.5
  dice_weight: 0.5
  focal_alpha: 0.25
  focal_gamma: 2.0
  dice_smooth: 1.0

infer:
  threshold: 0.5
  sliding_window: true
  patch_size:
  stride:
