name: Deploy RF Service

on:
  push:
    branches:
      - main
    paths:
      - "apps/ai_api/**"
      - "packages/**"
      - ".github/workflows/deploy-rf-service.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/ai_api/**"
      - "packages/**"
      - ".github/workflows/deploy-rf-service.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rf-service
  CONTAINER_NAME: wifi-rf-service
  APP_DIR: /opt/rf-service
  HOST_PORT: 8080
  CONTAINER_PORT: 8080

jobs:
  build-and-deploy:
    name: Build and deploy rf-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      # tensorflow:2.16.1-gpu 베이스 이미지가 크므로 빌드 전 디스크 확보
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/.ghcup /usr/local/lib/android /usr/share/dotnet
          docker image prune -f || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push rf-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/ai_api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Deploy rf-service on server
        if: github.event_name != 'pull_request'
        env:
          SERVER_HOST: ${{ secrets.RF_SERVER_HOST }}
          SERVER_USER: ${{ secrets.RF_SERVER_USER }}
          SERVER_PORT: ${{ secrets.RF_SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.RF_SERVER_SSH_KEY }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.image.outputs.image }}:${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${SERVER_HOST}" ]; then
            echo "RF_SERVER_HOST secret is required."
            exit 1
          fi
          if [ -z "${SERVER_USER}" ]; then
            echo "RF_SERVER_USER secret is required."
            exit 1
          fi
          if [ -z "${SERVER_SSH_KEY}" ]; then
            echo "RF_SERVER_SSH_KEY secret is required."
            exit 1
          fi

          SSH_PORT="${SERVER_PORT:-22}"

          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh -o StrictHostKeyChecking=accept-new \
              -i ~/.ssh/id_ed25519 \
              -p "$SSH_PORT" \
              "$SERVER_USER@$SERVER_HOST" \
              "GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' IMAGE='$IMAGE' CONTAINER_NAME='${CONTAINER_NAME}' APP_DIR='${APP_DIR}' HOST_PORT='${HOST_PORT}' CONTAINER_PORT='${CONTAINER_PORT}' bash -s" <<'REMOTE'
          set -euo pipefail

          echo "[deploy] Preparing directories..."
          mkdir -p "${APP_DIR}/models/unet"
          mkdir -p "${APP_DIR}/models/yolo"
          mkdir -p "${APP_DIR}/output"

          if [ ! -f "${APP_DIR}/.env" ]; then
            echo "[deploy] ERROR: ${APP_DIR}/.env not found."
            echo "[deploy] Copy apps/ai_api/.env.example to ${APP_DIR}/.env on the server and fill in production values."
            exit 1
          fi

          if [ ! -f "${APP_DIR}/models/unet/best_unet.pth" ]; then
            echo "[deploy] WARNING: UNet weights not found at ${APP_DIR}/models/unet/best_unet.pth"
            echo "[deploy]   Upload the file or set UNET_CHECKPOINT_PATH in .env to a different absolute path."
          fi
          if [ ! -f "${APP_DIR}/models/yolo/best.pt" ]; then
            echo "[deploy] WARNING: YOLO weights not found at ${APP_DIR}/models/yolo/best.pt"
            echo "[deploy]   Upload the file or set YOLO_MODEL_PATH in .env to a different absolute path."
          fi

          echo "[deploy] Logging in to GHCR..."
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

          echo "[deploy] Pulling image: ${IMAGE}"
          docker pull "${IMAGE}"

          echo "[deploy] Stopping old container..."
          docker stop "${CONTAINER_NAME}" || true
          docker rm "${CONTAINER_NAME}" || true

          echo "[deploy] Starting new container..."
          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart unless-stopped \
            --env-file "${APP_DIR}/.env" \
            -p "${HOST_PORT}:${CONTAINER_PORT}" \
            -v "${APP_DIR}/models:/opt/models:ro" \
            -v "${APP_DIR}/output:/opt/app/apps/ai_api/data/output" \
            "${IMAGE}"

          echo "[deploy] Waiting for health check (up to 120s)..."
          for i in $(seq 1 40); do
            if curl -fsS "http://127.0.0.1:${HOST_PORT}/health" > /dev/null; then
              echo "[deploy] RF service is healthy."
              docker image prune -f
              exit 0
            fi
            echo "[deploy] Health check retry ${i}/40..."
            sleep 3
          done

          echo "[deploy] Health check failed. Container logs:"
          docker logs --tail=200 "${CONTAINER_NAME}" || true
          exit 1
          REMOTE
